<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 14px;
  font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #ffffff;
  color: #111;
}

.container {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.title {
  font-size: 17px;
  font-weight: 600;
  margin: 0;
}

.description {
  font-size: 11px;
  color: #6b6b6b;
  line-height: 1.3;
}

button {
  border: none;
  border-radius: 9px;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;

  background: linear-gradient(180deg, #2f9cf4, #2389db);
  color: white;

  cursor: pointer;

  transition: transform 0.05s ease, box-shadow 0.15s ease;

  box-shadow: 0 2px 6px rgba(0,0,0,0.12);
}

button:active {
  transform: translateY(1px);
}

button.loading {
  opacity: 0.8;
  pointer-events: none;
}

</style>
</head>

<body>

<div class="container">

  <div class="title">UI Skeleton Generator</div>

  <div class="description">
    Generate skeleton loaders from your selected frame.
  </div>

  <button id="run">
    Generate
  </button>

</div>

<script>

const button = document.getElementById("run");

button.onclick = () => {


  parent.postMessage(
    { pluginMessage: { type: "run" } },
    "*"
  );

};

</script>

</body>
</html>
